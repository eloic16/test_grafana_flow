<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100" viewBox="0 0 200 100">
  <!-- Nœud 1 -->
  <g data-cell-id="node-1">
    <rect x="20" y="20" width="60" height="60" fill="#FFFFFF" stroke="#000000" />
    <text x="50" y="50" text-anchor="middle" font-size="12">Nœud 1</text>
  </g>

  <!-- Nœud 2 -->
  <g data-cell-id="node-2">
    <rect x="120" y="20" width="60" height="60" fill="#FFFFFF" stroke="#000000" />
    <text x="150" y="50" text-anchor="middle" font-size="12">Nœud 2</text>
  </g>

  <!-- Lien entre les nœuds -->
  <g data-cell-id="edge-1">
    <path d="M 80 50 L 120 50" stroke="#000000" stroke-width="2" fill="none" />
  </g>
</svg>
