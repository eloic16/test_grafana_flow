elements:
  queue:
    value: ${queue_depth}
    text: "Queue: ${__value.raw}"
    thresholds:
      - color: green
        value: 0
      - color: orange
        value: 50
      - color: red
        value: 100

  workers:
    value: ${active_workers}
    text: "Workers: ${__value.raw}"

  success:
    value: ${success_rate}
    text: "OK: ${__value.raw}/s"

  errors:
    value: ${error_rate}
    text: "Errors: ${__value.raw}/s"
    thresholds:
      - color: green
        value: 0
      - color: red
        value: 10

  queue_to_workers:
    value: ${processing_rate}
    color:
      mode: threshold
    thresholds:
      - color: green
        value: 0
      - color: red
        value: 100

  workers_to_success:
    value: ${success_rate}

  workers_to_errors:
    value: ${error_rate}
    color:
      fixed: red
