# Configuration globale
cellIdPreamble: "cell-"
gradientMode: "hue"

# Définition des seuils réutilisables (Anchor)
thresholds:
  temp_colors: &temp_thresholds
    - { color: "#2c7bb6", level: -5 }   # Froid (Bleu)
    - { color: "#ffffbf", level: 15 }   # Tempéré (Jaune/Blanc)
    - { color: "#d7191c", level: 30 }   # Chaud (Rouge)

cells:
  # --- PARIS ---
  paris:
    dataRef: "weather-paris-temp"
    label:
      units: "celcius"
      decimalPoints: 0
      separator: "space"
    fillColor:
      thresholds: *temp_thresholds

  # --- LYON ---
  lyon:
    dataRef: "weather-lyon-temp"
    label:
      units: "celcius"
      decimalPoints: 0
      separator: "space"
    fillColor:
      thresholds: *temp_thresholds

  # --- MARSEILLE ---
  marseille:
    dataRef: "weather-marseille-temp"
    label:
      units: "celcius"
      decimalPoints: 0
      separator: "space"
    fillColor:
      thresholds: *temp_thresholds
